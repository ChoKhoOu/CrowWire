server:
  port: 3000
  node_env: development
  log_level: info

redis:
  url: redis://redis:6379

llm:
  provider: openai                    # "openai" or "anthropic"
  api_key: sk-your-key-here
  base_url: ""                        # optional: custom endpoint (leave empty for provider default)
  scoring_model: gpt-4o-mini          # anthropic: claude-haiku-4-5-20250315
  summarization_model: gpt-4o-mini    # anthropic: claude-sonnet-4-6-20250315

feeds:
  rsshub_base_url: http://rsshub:1200
  sources:
    - name: wallstreetcn-latest
      source_type: rsshub
      route: /wallstreetcn/latest
      poll_interval_ms: 60000
      enabled: true
      tags: [finance, macro]

    - name: reuters-world
      source_type: rss
      url: https://feeds.reuters.com/reuters/worldNews
      poll_interval_ms: 120000
      enabled: true
      tags: [world, geopolitics]

    - name: hackernews-best
      source_type: rsshub
      route: /hackernews/best
      poll_interval_ms: 300000
      enabled: true
      tags: [tech]

delivery:
  targets:
    - name: my-discord
      type: discord
      enabled: true
      webhook_url: https://discord.com/api/webhooks/xxx/yyy
      filter:
        min_urgency: 0

    - name: my-openclaw
      type: openclaw
      enabled: true
      gateway_url: http://localhost:18789
      hooks_token: your-token-here
      hooks_path: /hooks
      channel: last
      filter:
        min_urgency: 85

scoring:
  urgent_threshold: 85
  batch_summarization_threshold: 20

queue:
  ingest_concurrency: 5
  scorer_concurrency: 10
  deliver_concurrency: 3
  urgent_flush_interval_ms: 30000
  batch_flush_interval_ms: 600000
  batch_flush_count_threshold: 50

dedup:
  ttl_hours: 72
  title_bucket_minutes: 30

content:
  max_size_bytes: 102400
