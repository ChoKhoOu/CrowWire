feeds:
  - name: wallstreetcn-latest
    source_type: rsshub
    route: /wallstreetcn/latest
    poll_interval_ms: 60000
    enabled: true
    tags: ["finance", "macro"]

  - name: reuters-world
    source_type: rss
    url: https://feeds.reuters.com/reuters/worldNews
    poll_interval_ms: 120000
    enabled: true
    tags: ["world", "geopolitics"]

  - name: hackernews-best
    source_type: rsshub
    route: /hackernews/best
    poll_interval_ms: 300000
    enabled: true
    tags: ["tech"]
