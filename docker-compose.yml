services:
  rsshub:
    image: diygod/rsshub:latest
    restart: unless-stopped
    ports:
      - "1200:1200"
    environment:
      - NODE_ENV=production
      - CACHE_TYPE=memory
      - CACHE_EXPIRE=300
      - REQUEST_TIMEOUT=30000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:1200"]
      interval: 30s
      timeout: 10s
      retries: 3
