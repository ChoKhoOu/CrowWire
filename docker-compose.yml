services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: crowwire
      POSTGRES_PASSWORD: crowwire
      POSTGRES_DB: crowwire
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crowwire"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - crowwire-net

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - crowwire-net

  rsshub:
    image: diygod/rsshub
    environment:
      CACHE_TYPE: redis
      REDIS_URL: redis://redis:6379/
      CACHE_EXPIRE: 300
      CACHE_CONTENT_EXPIRE: 3600
    ports:
      - "1200:1200"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:1200/"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - crowwire-net

  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rsshub:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - crowwire-net

networks:
  crowwire-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
